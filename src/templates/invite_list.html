<section id = "games_list">
{% if invites %}
{% for game in invites %}

<section class="invite pixel_border">

    

{% include "game_entry.html" %}

<p>{{ game["message"] }}</p>
<p><i>From <b>{{ game["host"][1:] }}</b> at {{ datetime.strftime(datetime.strptime(game["time"], "%Y-%m-%d %H:%M:%S"), "%H:%M on %d %B %Y") }}</i></p>

</section>

{% endfor %}
{% else %}
<p id="inbox_msg">No messages at the moment!</p>
{% endif %}

</section>
