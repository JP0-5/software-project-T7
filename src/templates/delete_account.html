{% extends 'base.html' %}
{% block main_content %}

<form class="pixel_border" id="registration" action="" method="POST" novalidate>
    <h1>Delete Your Account</h1>

    {{ form.hidden_tag() }}

    <p>
    {{ form.check() }}
    {{ form.check.label }}
    <br>
    {% for error in form.check.errors %}
        {{ error }}
    {% endfor %}
    </p>
    {{ form.submit() }}
</form>

{% endblock %}
