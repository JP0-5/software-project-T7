<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset = "utf-8">
        <title>{{ title }}</title>
        <link rel="stylesheet" href="{{ url_for('static', filename='play.css') }}">
        <link rel="icon" href="{{ url_for('static',filename='favicon.ico') }}">
        <script src="{{ url_for('static', filename='settings.js') }}"></script>
        <script src="https://cdn.socket.io/4.8.1/socket.io.min.js"></script>
        <script>
            const playerID = "{{ session['player_id'] }}";
        </script>
        <script src="{{ url_for('static', filename='play.js') }}"></script>
    </head>
    <body>
        <main>
            <canvas height="695" width="1536"></canvas>
            <a id="hit"><span>HIT</span></a>
            <a id="stand"><span>STAND</span></a>
            <a id="home"><span>HOME</span></a>
            <section id="side">
                <section id="sideContent">
                    <section id="side_navbar">
                        <p >Round: </p><p><b  id="roundNum"></b></p>
                        <a href="{{ url_for('main')}}"><img alt="Leave Game"src="{{ url_for('static', filename='logout3.png')}}"></a>
                       <a href="#" onclick="openSettings()" id="settings"><img alt="Settings"src="{{ url_for('static', filename='settings.png')}}"></a>
                    </section>

                    <section class="game_header">
                    <p >Game code: </p><p><b id="gameId"></b></p>
                    </section>


                    <section class="game_header">
                    <p >Game status: </p><p><b  id="connectionStatus">Disconnected</b></p>
                    </section>

                    <section class="game_header">
                    <p >Game mode: </p><p><b  id="gameMode">{{ game_mode }}</b></p>
                    </section>

                    
                  
        

                   
                </section>
                <section id="messages">
                    {% for message in messages %}
                        {% if message[1] %}
                            <p>{{message[1][1:]}}: {{message[2]}}</p>
                        {% else %}
                            <p><i>{{message[2]}}</i></p>
                        {% endif %}
                    {% endfor %}
                </section>
                <section id="send_msg">
                     <input id="messageInput" type="text" placeholder="Enter your message">
                    <button id="sendButton" disabled>Send</button>
                </section>
                
            </section>
        </main>

        
    </body>
</html>


    <section id="settings_box">
            <section class="pixel_border" id="settings_content">
                <img onclick="closeSettings()" id="close_settings"
                    src="{{ url_for('static', filename='close_button.png')}}">
                <h2>Settings</h2>
                <section class="pixel_border audio">
                    <section class="audio_label">
                        <p>Music</p>
                        <img src="{{ url_for('static', filename='music_note2.png')}}"></img>
                    </section>
                    <section class="audio_select">
                        <button id="music_on" class="active" onclick="musicOn()">On</button>
                        <button id="music_off" onclick="musicOff()">Off</button>
                    </section>
                </section>
                <section class="pixel_border audio">
                    <section class="audio_label">
                        <p>Sound</p>
                        <img src="{{ url_for('static', filename='headphones.png')}}"></img>
                    </section>
                    <section class="audio_select">
                        <button id="sound_on" onclick="soundOn()">On</button>
                        <button id="sound_off" onclick="soundOff()">Off</button>
                    </section>
                </section>
                <a class="pixel_border" href="{{ url_for('account_settings') }}" class="settings_button">Account</a>
                <a class="pixel_border" href="{{ url_for('how_to_play') }}" class="settings_button">How to Play</a>
                <a class="pixel_border" href="{{ url_for('attribution') }}" class="settings_button">Attribution</a>

            </section>
        </section>
        </section>
