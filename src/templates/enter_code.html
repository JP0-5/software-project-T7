{% extends 'base.html' %}
{% block main_content %}


<section>

    <form class = "pixel_border" action="" id="registration" method="post" novalidate>
        <h1> Enter Game Code </h1>

        {{ form.hidden_tag() }}

        

        <p>
            {{ form.code() }}
            <br>
            {% for error in form.code.errors %}
            {{ error }}
            {% endfor %}
        </p>


        {{ form.submit() }}

    </form>

</section>
{% endblock %}
