{% extends 'base.html' %}
{% block main_content %}


<section>

    <form action="" id="registration" method="post" novalidate>
        <h1> Enter Game Code </h1>

        {{ form.hidden_tag() }}

        <p id="label">{{ form.code.label }}</p>

        <p>
            {{ form.code() }}

            {% for error in form.code.errors %}
            {{ error }}
            {% endfor %}
        </p>


        {{ form.submit() }}

    </form>

</section>
{% endblock %}
