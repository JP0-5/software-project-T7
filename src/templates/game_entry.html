<section class="game_entry" id="game_{{ game['game_id'] }}">
    
<p>{{game["game_id"]}}</p>
<p>{{game["host"][1:]}}</p>
<p class="game_mode">
{% if game["game_mode"] == 0 %}
Classic
{% else %}
Modified
{% endif %}
</p>
<p><span class="player_count">{{game["player_count"]}}</span>/{{game["allowed_players"]}}</p>
<a href="{{ url_for('play',game_id=game['game_id'] )}}">Join Game</a>

</section>
